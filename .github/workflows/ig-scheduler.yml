name: IG scheduler
on:
  schedule:
    - cron: "*/5 * * * *"   # every 10 min (UTC). A post fires within ~10 min of its epoch.
  workflow_dispatch:          # manual trigger for testing
permissions:
  contents: write
concurrency:
  group: ig-scheduler
  cancel-in-progress: false
jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Publish due posts
        env:
          FB_TOKEN: ${{ secrets.FB_TOKEN }}
        run: python3 social/publish.py
      - name: Commit posted state
        run: |
          git config user.name "push-scheduler"
          git config user.email "actions@users.noreply.github.com"
          git add social/schedule.json
          git diff --staged --quiet || git commit -m "scheduler: mark posted [skip ci]"
          git push
