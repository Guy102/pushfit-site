name: IG scheduler
on:
  schedule:
    - cron: "*/5 * * * *"   # every 5 min (UTC). publish.py sleeps to each post's exact epoch.
  workflow_dispatch:          # manual trigger for testing
permissions:
  contents: write
concurrency:
  group: ig-scheduler
  cancel-in-progress: false   # never cancel a run that may be mid-wait/mid-publish
jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 100       # a run may sleep up to ~90 min (WINDOW) for exact timing
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Publish due posts
        env:
          FB_TOKEN: ${{ secrets.FB_TOKEN }}
        run: python3 social/publish.py
      - name: Commit posted state
        run: |
          git config user.name "push-scheduler"
          git config user.email "actions@users.noreply.github.com"
          git add social/schedule.json
          git diff --staged --quiet || git commit -m "scheduler: mark posted [skip ci]"
          git pull --rebase --autostash origin main || true
          git push
